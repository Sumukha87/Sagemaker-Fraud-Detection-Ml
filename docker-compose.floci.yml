services:
  floci:
    image: floci/floci:latest
    container_name: localsage-aws
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: localsage-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlartifacts
    volumes:
      - mlflow_data:/mlflow.db
      - mlflow_artifacts:/mlartifacts

volumes:
  mlflow_data:
  mlflow_artifacts:
